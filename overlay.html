<!DOCTYPE html>
<!--
  FRLG Tracker — OBS Studio Overlay
  ──────────────────────────────────
  Add as a Browser Source in OBS. Enable "Allow transparency" in the source settings.

  URLs:
    Wild Pokémon        : http://localhost:8080/overlay.html?section=wild
    Items               : http://localhost:8080/overlay.html?section=items
    Trainers            : http://localhost:8080/overlay.html?section=trainers
    Wild Pokémon + Items: http://localhost:8080/overlay.html?section=combined

  URL params (all optional):
    section  wild | items | trainers | combined   Which section to display
    width    any number (default: 340)             Panel width in pixels
    opacity  0.0–1.0 (default: 0.92)              Panel background opacity
    theme    warm | cool (default: warm)           warm = tracker brown-black; cool = navy
    worker   URL                                   Cloudflare /state endpoint for cross-browser sync

  Examples:
    ?section=combined&width=300&opacity=0.80
    ?section=wild&theme=cool&width=200&opacity=0.85&worker=https://frlg.nabunan.com/state

  Suggested OBS source size: set width to match your ?width= value; height 600+
  (OBS auto-crops transparent rows at the bottom).
  The panel updates within ~1.5 seconds when you switch areas in the main tracker.

  Cross-browser OBS setup (tracker in Chrome, overlay in OBS):
    Add worker= param pointing to the Cloudflare /state endpoint.
    The tracker posts state there on every change; the overlay polls it.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRLG Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; }
    body { font-family: 'DM Sans', sans-serif; color: #ede0d4; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    // ─── Sprite helpers ──────────────────────────────────────────────────────────
    const pokeSprite = name => {
      const id = window.__FRLG_DEX_ID && window.__FRLG_DEX_ID[name];
      return id ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png` : null;
    };
    const itemSprite = name => {
      const key = window.__FRLG_ITEM_SPRITE && window.__FRLG_ITEM_SPRITE[name];
      return key ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${key}.png` : null;
    };

    // ─── Method badge colors ─────────────────────────────────────────────────────
    const METHOD_COLOR = {
      "Grass":      { bg:"rgba(74,175,116,0.15)",  color:"#4aaf74" },
      "Cave":       { bg:"rgba(180,150,100,0.15)", color:"#b49664" },
      "Surf":       { bg:"rgba(90,176,216,0.15)",  color:"#5ab0d8" },
      "Old Rod":    { bg:"rgba(90,176,216,0.12)",  color:"#5ab0d8" },
      "Good Rod":   { bg:"rgba(90,176,216,0.12)",  color:"#5ab0d8" },
      "Super Rod":  { bg:"rgba(90,176,216,0.12)",  color:"#5ab0d8" },
      "Gift":       { bg:"rgba(200,150,10,0.15)",  color:"#c8960a" },
      "Trade":      { bg:"rgba(200,150,10,0.15)",  color:"#c8960a" },
      "Fossil":     { bg:"rgba(180,150,100,0.15)", color:"#b49664" },
      "Event":      { bg:"rgba(168,122,204,0.15)", color:"#a87acc" },
      "Game Corner":{ bg:"rgba(200,150,10,0.15)",  color:"#c8960a" },
    };

    // ─── Section config ───────────────────────────────────────────────────────────
    const SECTION_META = {
      wild:     { label: "WILD POKÉMON", accent: "#4aaf74" },
      items:    { label: "ITEMS",        accent: "#c8960a" },
      trainers: { label: "TRAINERS",     accent: "#a87acc" },
      combined: { label: "WILD POKÉMON + ITEMS", accent: "#4aaf74" },
    };

    // ─── Rate helpers ─────────────────────────────────────────────────────────────
    function effectivePct(p, ver) {
      const split = p.rate && p.rate.match(/^(\S+)\s+FR\s*\/\s*(\S+)\s+LG$/i);
      const raw   = split ? (ver === "fr" ? split[1] : split[2]) : p.rate;
      const m     = raw && raw.match(/^(\d+(?:\.\d+)?)%/);
      return m ? parseFloat(m[1]) : 0;
    }
    function versionRate(p, ver) {
      const split = p.rate && p.rate.match(/^(\S+)\s+FR\s*\/\s*(\S+)\s+LG$/i);
      return split ? (ver === "fr" ? split[1] : split[2]) : p.rate;
    }
    function sortByRate(pokemon, ver) {
      const out = [];
      let i = 0;
      while (i < pokemon.length) {
        const method = pokemon[i].method;
        let j = i;
        while (j < pokemon.length && pokemon[j].method === method) j++;
        out.push(...pokemon.slice(i, j).slice().sort((a, b) => effectivePct(b, ver) - effectivePct(a, ver)));
        i = j;
      }
      return out;
    }

    // ─── Flatten helpers ──────────────────────────────────────────────────────────
    function flattenItems(area) {
      if (area.floors) {
        return area.floors.flatMap(f =>
          (f.items || []).map((entry, idx) => ({ entry, floorLabel: f.label, idx }))
        );
      }
      return (area.items || []).map((entry, idx) => ({ entry, floorLabel: null, idx }));
    }
    function flattenTrainers(area) {
      if (area.floors) {
        return area.floors.flatMap(f =>
          (f.trainers || []).map(trainer => ({ trainer, floorLabel: f.label }))
        );
      }
      return (area.trainers || []).map(trainer => ({ trainer, floorLabel: null }));
    }
    function itemKey(areaId, floorLabel, idx) {
      return floorLabel ? `${areaId}|${floorLabel}|${idx}` : `${areaId}|${idx}`;
    }

    // ─── Wild row builder ─────────────────────────────────────────────────────────
    function getWildSection(m) {
      if (m === "Surf") return "surf";
      if (m === "Old Rod" || m === "Good Rod" || m === "Super Rod") return "fishing";
      return "land";
    }
    const SEC_LABEL = { surf:"SURF", fishing:"FISHING" };

    function buildWildRows(area, areaId, version, collapsedFloors) {
      const floors = area.floors
        ? area.floors.map(f => ({ label: f.label, pokemon: f.pokemon || [] }))
        : [{ label: null, pokemon: area.pokemon || [] }];
      const rows = [];
      floors.forEach(({ label, pokemon }, fi) => {
        if (label && collapsedFloors[`${areaId}|${label}`]) return;
        const visible = sortByRate(
          pokemon.filter(p => !((p.frOnly && version === "lg") || (p.lgOnly && version === "fr"))),
          version
        );
        if (!visible.length) return;
        if (label) rows.push({ type:"floor", label });
        let lastSec = null;
        visible.forEach(p => {
          const sec = getWildSection(p.method);
          if (sec !== lastSec) {
            const secLabel = sec === "land" ? p.method.toUpperCase() : SEC_LABEL[sec];
            rows.push({ type:"method", label: secLabel, color: (METHOD_COLOR[p.method] || {}).color });
            lastSec = sec;
          }
          rows.push({ type:"pokemon", p, fi });
        });
      });
      return rows;
    }

    // ─── Item row builder ─────────────────────────────────────────────────────────
    function buildItemRows(area, areaId, collapsedFloors) {
      const entries = flattenItems(area);
      const rows = [];
      let lastFloor = undefined;
      entries.forEach(({ entry, floorLabel, idx }) => {
        if (floorLabel && collapsedFloors[`${areaId}|${floorLabel}`]) return;
        if (floorLabel !== lastFloor) {
          if (floorLabel) rows.push({ type:"floor", label: floorLabel, isFirst: rows.length === 0 });
          lastFloor = floorLabel;
        }
        rows.push({ type:"item", entry, floorLabel, idx });
      });
      return rows;
    }

    // ─── OverlayApp ───────────────────────────────────────────────────────────────
    function OverlayApp() {
      const params  = new URLSearchParams(window.location.search);
      const section = params.get("section") || "wild";
      const meta    = SECTION_META[section] || SECTION_META.wild;

      const panelWidth   = parseInt(params.get("width"),   10) || 340;
      const panelOpacity = Math.min(1, Math.max(0, parseFloat(params.get("opacity")) || 0.92));
      const isCool       = params.get("theme") === "cool";
      const workerUrl    = params.get("worker") || null;

      const T = isCool ? {
        bg:           `rgba(16,20,28,${panelOpacity})`,
        border:       "#2a3040",
        textPrimary:  "#dde4f0",
        textMuted:    "#7a8a9a",
        divider:      "rgba(42,48,64,0.5)",
        teamBg:       "rgba(42,48,64,0.5)",
        placeholderBg:"rgba(42,48,64,0.4)",
      } : {
        bg:           `rgba(28,21,16,${panelOpacity})`,
        border:       "#3a2a1c",
        textPrimary:  "#ede0d4",
        textMuted:    "#8a7a6a",
        divider:      "rgba(58,42,28,0.5)",
        teamBg:       "rgba(58,42,28,0.5)",
        placeholderBg:"rgba(58,42,28,0.4)",
      };

      const [ready,           setReady]           = React.useState(false);
      const [areaId,          setAreaId]          = React.useState(null);
      const [version,         setVersion]         = React.useState("fr");
      const [caught,          setCaught]          = React.useState({});
      const [items,           setItems]           = React.useState({});
      const [trainers,        setTrainers]        = React.useState({});
      const [trades,          setTrades]          = React.useState({});
      const [collapsedFloors, setCollapsedFloors] = React.useState({});

      React.useEffect(() => {
        function applyState(s) {
          if (!s) return;
          if (s.areaId)   setAreaId(s.areaId);
          if (s.version)  setVersion(s.version);
          if (s.caught)   setCaught(s.caught);
          if (s.items)    setItems(s.items);
          if (s.trainers) setTrainers(s.trainers);
          if (s.trades)   setTrades(s.trades);
          setCollapsedFloors(s.collapsedFloors || {});
        }
        function poll() {
          if (workerUrl) {
            fetch(workerUrl).then(r => r.json()).then(applyState).catch(() => {});
          } else {
            try {
              applyState({
                areaId:          localStorage.getItem("frlg-active-area"),
                version:         localStorage.getItem("frlg-version"),
                caught:          JSON.parse(localStorage.getItem("fr-caught5")   || "null"),
                items:           JSON.parse(localStorage.getItem("fr-items5")    || "null"),
                trainers:        JSON.parse(localStorage.getItem("fr-trainers1") || "null"),
                trades:          JSON.parse(localStorage.getItem("frlg-trades")  || "null"),
                collapsedFloors: JSON.parse(localStorage.getItem("frlg-collapsed-floors") || "null"),
              });
            } catch {}
          }
        }
        poll();
        const id = setInterval(poll, 1500);
        return () => clearInterval(id);
      }, []);

      React.useEffect(() => {
        function check() { if (window.__FRLG_AREAS) setReady(true); }
        check();
        const id = setInterval(check, 200);
        return () => clearInterval(id);
      }, []);

      const panel = {
        width: panelWidth,
        background: T.bg,
        border: `1px solid ${T.border}`,
        borderRadius: 10,
        padding: "10px 14px",
        fontFamily: "'DM Sans', sans-serif",
        color: T.textPrimary,
      };
      const sectionHeader = (accent) => ({
        fontSize: 11, fontWeight: 700, letterSpacing: 2, color: accent,
        borderLeft: `3px solid ${accent}`, paddingLeft: 7, marginBottom: 8,
      });
      const areaLabel = { fontSize: 11, color: T.textMuted, marginBottom: 6 };
      const floorLabelStyle = (isFirst) => ({
        fontSize: 11, fontWeight: 700, letterSpacing: 1,
        color: T.textMuted,
        borderLeft: `2px solid ${T.border}`,
        paddingLeft: 5,
        marginTop: isFirst ? 2 : 8,
        marginBottom: 3,
      });

      if (!ready) return <div style={{ ...panel, color: T.textMuted, fontSize: 11 }}>Loading…</div>;
      if (!areaId) return <div style={{ ...panel, color: T.textMuted, fontSize: 11 }}>Select an area in the tracker</div>;

      const area = (window.__FRLG_AREAS || []).find(a => a.id === areaId);
      if (!area) return null;

      // ── Shared row renderers ───────────────────────────────────────────────────
      const makeWildRenderer = (rows) => {
        const secStats = {};
        rows.forEach(r => {
          if (r.type !== "pokemon") return;
          const k = `${r.fi}:${getWildSection(r.p.method)}`;
          if (!secStats[k]) secStats[k] = { total:0, done:0 };
          secStats[k].total++;
          if (caught[r.p.name]) secStats[k].done++;
        });
        const secDone = (fi, m) => { const k = `${fi}:${getWildSection(m)}`; return secStats[k] && secStats[k].done === secStats[k].total; };

        return (row, i) => {
          if (row.type === "floor") return <div key={i} style={floorLabelStyle(i === 0)}>{row.label}</div>;
          if (row.type === "method") {
            const prevRow = rows[i - 1];
            return (
              <div key={i} style={{ fontSize:10, fontWeight:700, letterSpacing:1.5, color: row.color || T.textMuted,
                                    marginTop: (prevRow && prevRow.type === "floor") ? 0 : (i === 0 ? 2 : 7), marginBottom: 2 }}>
                {row.label}
              </div>
            );
          }
          const p = row.p;
          const isCaught  = caught[p.name];
          const mc        = METHOD_COLOR[p.method] || { bg:"rgba(120,100,80,0.15)", color: T.textMuted };
          const spriteUrl = pokeSprite(p.name);
          const vTag      = p.frOnly ? "FR" : p.lgOnly ? "LG" : null;
          const dimmed    = secDone(row.fi, p.method);
          const nextRow   = rows[i + 1];
          const border    = (!nextRow || nextRow.type === "floor" || nextRow.type === "method") ? "none" : `1px solid ${T.divider}`;
          return (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:7, padding:"5px 0", opacity: dimmed ? 0.35 : 1, borderBottom: border }}>
              {spriteUrl
                ? <img src={spriteUrl} alt={p.name} width={32} height={32} style={{ imageRendering:"pixelated", flexShrink:0, opacity: isCaught ? 1 : 0.65, filter: isCaught ? "none" : "brightness(0)" }} />
                : <div style={{ width:32, height:32, flexShrink:0 }} />}
              <span style={{ fontSize:14, flex:1, minWidth:0, color: isCaught ? "#4aaf74" : T.textPrimary, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                {p.name}
              </span>
              {vTag && (
                <span style={{ fontSize:11, fontWeight:700, color: vTag === "FR" ? "#d4621a" : "#3fa84a", background: vTag === "FR" ? "rgba(212,98,26,0.15)" : "rgba(63,168,74,0.15)", borderRadius:4, padding:"1px 6px", flexShrink:0 }}>
                  {vTag}
                </span>
              )}
              <span style={{ fontSize:11, background:mc.bg, color:mc.color, borderRadius:4, padding:"1px 6px", flexShrink:0 }}>
                {{"Old Rod":"Old","Good Rod":"Good","Super Rod":"Super"}[p.method] ?? p.method}
              </span>
              <span style={{ fontSize:11, color: T.textMuted, flexShrink:0, whiteSpace:"nowrap" }}>
                {versionRate(p, version)}
              </span>
            </div>
          );
        };
      };

      const makeItemRenderer = (rows) => (row, i) => {
        if (row.type === "floor") return <div key={i} style={floorLabelStyle(row.isFirst)}>{row.label}</div>;
        const { entry: it, floorLabel, idx } = row;
        const key       = itemKey(areaId, floorLabel, idx);
        const collected = it.heldBy
          ? (Array.isArray(it.heldBy) ? it.heldBy : [it.heldBy]).some(n => !!trades[`${areaId}|trade|${n}`])
          : !!items[key];
        const spriteUrl = itemSprite(it.name);
        const nextRow   = rows[i + 1];
        const border    = (!nextRow || nextRow.type === "floor") ? "none" : `1px solid ${T.divider}`;
        return (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:7, padding:"5px 0", opacity: collected ? 0.45 : 1, borderBottom: border }}>
            {spriteUrl
              ? <img src={spriteUrl} alt={it.name} width={32} height={32} style={{ imageRendering:"pixelated", flexShrink:0 }} />
              : <div style={{ width:32, height:32, background: T.placeholderBg, borderRadius:4, flexShrink:0 }} />}
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:14, color: collected ? T.textMuted : T.textPrimary, textDecoration: collected ? "line-through" : "none", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                {it.hidden && <span style={{ color:"#c8960a", marginRight:3 }}>★</span>}
                {it.name}
              </div>
              {it.note && (
                <div style={{ fontSize:11, color: T.textMuted, marginTop:1, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                  {it.note}
                </div>
              )}
            </div>
            {collected && <span style={{ fontSize:16, color:"#4aaf74", flexShrink:0 }}>✓</span>}
          </div>
        );
      };

      // ── Wild ──────────────────────────────────────────────────────────────────
      if (section === "wild") {
        const rows = buildWildRows(area, areaId, version, collapsedFloors);
        if (!rows.length) return null;
        return (
          <div style={panel}>
            <div style={sectionHeader(meta.accent)}>{meta.label}</div>
            <div style={areaLabel}>{area.name}</div>
            {rows.map(makeWildRenderer(rows))}
          </div>
        );
      }

      // ── Items ─────────────────────────────────────────────────────────────────
      if (section === "items") {
        const rows = buildItemRows(area, areaId, collapsedFloors);
        if (!rows.length) return null;
        return (
          <div style={panel}>
            <div style={sectionHeader(meta.accent)}>{meta.label}</div>
            <div style={areaLabel}>{area.name}</div>
            {rows.map(makeItemRenderer(rows))}
          </div>
        );
      }

      // ── Combined ──────────────────────────────────────────────────────────────
      if (section === "combined") {
        const wRows = buildWildRows(area, areaId, version, collapsedFloors);
        const iRows = buildItemRows(area, areaId, collapsedFloors);
        if (!wRows.length && !iRows.length) return null;
        return (
          <div style={panel}>
            <div style={areaLabel}>{area.name}</div>
            {wRows.length > 0 && (
              <>
                <div style={sectionHeader(SECTION_META.wild.accent)}>{SECTION_META.wild.label}</div>
                {wRows.map(makeWildRenderer(wRows))}
              </>
            )}
            {wRows.length > 0 && iRows.length > 0 && (
              <div style={{ height:1, background: T.border, margin:"10px 0 8px" }} />
            )}
            {iRows.length > 0 && (
              <>
                <div style={sectionHeader(SECTION_META.items.accent)}>{SECTION_META.items.label}</div>
                {iRows.map(makeItemRenderer(iRows))}
              </>
            )}
          </div>
        );
      }

      // ── Trainers ──────────────────────────────────────────────────────────────
      if (section === "trainers") {
        const entries = flattenTrainers(area);
        if (!entries.length) return null;
        const rows = [];
        let lastFloor = undefined;
        entries.forEach(({ trainer, floorLabel }) => {
          if (floorLabel && collapsedFloors[`${areaId}|${floorLabel}`]) return;
          if (floorLabel !== lastFloor) {
            if (floorLabel) rows.push({ type:"floor", label: floorLabel, isFirst: rows.length === 0 });
            lastFloor = floorLabel;
          }
          rows.push({ type:"trainer", trainer });
        });
        return (
          <div style={panel}>
            <div style={sectionHeader(meta.accent)}>{meta.label}</div>
            <div style={areaLabel}>{area.name}</div>
            {rows.map((row, i) => {
              if (row.type === "floor") return <div key={i} style={floorLabelStyle(row.isFirst)}>{row.label}</div>;
              const tr      = row.trainer;
              const key     = `${areaId}|${tr.class}|${tr.name}`;
              const defeated = trainers[key];
              const nextRow = rows[i + 1];
              const border  = (!nextRow || nextRow.type === "floor") ? "none" : `1px solid ${T.divider}`;
              return (
                <div key={i} style={{ padding:"4px 0", opacity: defeated ? 0.45 : 1, borderBottom: border }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <span style={{ fontSize:11, color:"#a87acc", marginRight:4 }}>{tr.class}</span>
                      <span style={{ fontSize:11, color: defeated ? T.textMuted : T.textPrimary, textDecoration: defeated ? "line-through" : "none" }}>{tr.name}</span>
                    </div>
                    {defeated && <span style={{ fontSize:13, color:"#4aaf74", flexShrink:0 }}>✓</span>}
                  </div>
                  {tr.team && tr.team.length > 0 && (
                    <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:3 }}>
                      {tr.team.map((mon, j) => {
                        const url = pokeSprite(mon.name);
                        return (
                          <div key={j} style={{ display:"flex", alignItems:"center", gap:2, background: T.teamBg, borderRadius:5, padding:"1px 5px 1px 2px" }}>
                            {url && <img src={url} alt={mon.name} width={20} height={20} style={{ imageRendering:"pixelated" }} />}
                            <span style={{ fontSize:9, color: T.textMuted }}>{mon.name} <span style={{ color:"#c8960a" }}>{mon.level}</span></span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      }

      return null;
    }

    // ─── Bootstrap ────────────────────────────────────────────────────────────────
    fetch('firered-area-tracker-v3.jsx?t=' + Date.now())
      .then(r => r.text())
      .then(jsx => {
        const code = Babel.transform(jsx, { presets: ['react'] }).code;
        (0, eval)(code);
      })
      .catch(e => console.error('overlay: failed to load tracker data:', e));

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(OverlayApp));
  </script>
</body>
</html>
