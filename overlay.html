<!DOCTYPE html>
<!--
  FRLG Tracker — OBS Studio Overlay
  ──────────────────────────────────
  Add as a Browser Source in OBS. Enable "Allow transparency" in the source settings.

  URLs:
    Wild Pokémon : http://localhost:8080/overlay.html?section=wild
    Items        : http://localhost:8080/overlay.html?section=items
    Trainers     : http://localhost:8080/overlay.html?section=trainers

  URL params (all optional):
    section  wild | items | trainers        Which section to display
    width    any number (default: 340)      Panel width in pixels
    opacity  0.0–1.0 (default: 0.92)        Panel background opacity
    theme    warm | cool (default: warm)    warm = tracker brown-black; cool = navy for sidebar use

  Examples:
    ?section=wild&width=300&opacity=0.80
    ?section=items&width=200&theme=cool&opacity=0.85

  Suggested OBS source size: set width to match your ?width= value; height 600+
  (OBS auto-crops transparent rows at the bottom).
  The panel updates within ~1.5 seconds when you switch areas in the main tracker.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRLG Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; }
    body { font-family: 'DM Sans', sans-serif; color: #ede0d4; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    // ─── Sprite helpers ──────────────────────────────────────────────────────────
    const pokeSprite = name => {
      const id = window.__FRLG_DEX_ID && window.__FRLG_DEX_ID[name];
      return id ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png` : null;
    };
    const itemSprite = name => {
      const key = window.__FRLG_ITEM_SPRITE && window.__FRLG_ITEM_SPRITE[name];
      return key ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${key}.png` : null;
    };

    // ─── Method badge colors (matching main tracker) ──────────────────────────────
    const METHOD_COLOR = {
      "Grass":      { bg:"rgba(74,175,116,0.15)",  color:"#4aaf74" },
      "Cave":       { bg:"rgba(180,150,100,0.15)", color:"#b49664" },
      "Surf":       { bg:"rgba(90,176,216,0.15)",  color:"#5ab0d8" },
      "Old Rod":    { bg:"rgba(90,176,216,0.12)",  color:"#5ab0d8" },
      "Good Rod":   { bg:"rgba(90,176,216,0.12)",  color:"#5ab0d8" },
      "Super Rod":  { bg:"rgba(90,176,216,0.12)",  color:"#5ab0d8" },
      "Gift":       { bg:"rgba(200,150,10,0.15)",  color:"#c8960a" },
      "Trade":      { bg:"rgba(200,150,10,0.15)",  color:"#c8960a" },
      "Fossil":     { bg:"rgba(180,150,100,0.15)", color:"#b49664" },
      "Event":      { bg:"rgba(168,122,204,0.15)", color:"#a87acc" },
      "Game Corner":{ bg:"rgba(200,150,10,0.15)",  color:"#c8960a" },
    };

    // ─── Section config ───────────────────────────────────────────────────────────
    const SECTION_META = {
      wild:     { label: "WILD POKÉMON", accent: "#4aaf74" },
      items:    { label: "ITEMS",        accent: "#c8960a" },
      trainers: { label: "TRAINERS",     accent: "#a87acc" },
    };

    // ─── Rate sorting (mirrors renderPokemonList in main tracker) ────────────────
    // Within each consecutive same-method block, sort by effective rate descending
    // for the active version. Handles split-rate strings like "1% FR / 4% LG".
    function effectivePct(p, ver) {
      const split = p.rate && p.rate.match(/^(\S+)\s+FR\s*\/\s*(\S+)\s+LG$/i);
      const raw   = split ? (ver === "fr" ? split[1] : split[2]) : p.rate;
      const m     = raw && raw.match(/^(\d+(?:\.\d+)?)%/);
      return m ? parseFloat(m[1]) : 0;
    }
    function versionRate(p, ver) {
      const split = p.rate && p.rate.match(/^(\S+)\s+FR\s*\/\s*(\S+)\s+LG$/i);
      return split ? (ver === "fr" ? split[1] : split[2]) : p.rate;
    }
    function sortByRate(pokemon, ver) {
      const out = [];
      let i = 0;
      while (i < pokemon.length) {
        const method = pokemon[i].method;
        let j = i;
        while (j < pokemon.length && pokemon[j].method === method) j++;
        out.push(...pokemon.slice(i, j).slice().sort((a, b) => effectivePct(b, ver) - effectivePct(a, ver)));
        i = j;
      }
      return out;
    }

    // ─── Flatten helpers ──────────────────────────────────────────────────────────
    function flattenItems(area) {
      if (area.floors) {
        return area.floors.flatMap(f =>
          (f.items || []).map((entry, idx) => ({ entry, floorLabel: f.label, idx }))
        );
      }
      return (area.items || []).map((entry, idx) => ({ entry, floorLabel: null, idx }));
    }
    function flattenTrainers(area) {
      if (area.floors) {
        return area.floors.flatMap(f =>
          (f.trainers || []).map(trainer => ({ trainer, floorLabel: f.label }))
        );
      }
      return (area.trainers || []).map(trainer => ({ trainer, floorLabel: null }));
    }

    // ─── Item key — must match main tracker exactly ───────────────────────────────
    function itemKey(areaId, floorLabel, idx) {
      return floorLabel ? `${areaId}|${floorLabel}|${idx}` : `${areaId}|${idx}`;
    }

    // ─── OverlayApp ───────────────────────────────────────────────────────────────
    function OverlayApp() {
      const params  = new URLSearchParams(window.location.search);
      const section = params.get("section") || "wild";
      const meta    = SECTION_META[section] || SECTION_META.wild;

      // ── URL-configurable display params ────────────────────────────────────────
      const panelWidth   = parseInt(params.get("width"),   10) || 340;
      const panelOpacity = Math.min(1, Math.max(0, parseFloat(params.get("opacity")) || 0.92));
      const isCool       = params.get("theme") === "cool";

      // ── Theme palette ──────────────────────────────────────────────────────────
      const T = isCool ? {
        bg:          `rgba(16,20,28,${panelOpacity})`,
        border:      "#2a3040",
        textPrimary: "#dde4f0",
        textMuted:   "#7a8a9a",
        divider:     "rgba(42,48,64,0.5)",
        teamBg:      "rgba(42,48,64,0.5)",
        placeholderBg:"rgba(42,48,64,0.4)",
      } : {
        bg:          `rgba(28,21,16,${panelOpacity})`,
        border:      "#3a2a1c",
        textPrimary: "#ede0d4",
        textMuted:   "#8a7a6a",
        divider:     "rgba(58,42,28,0.5)",
        teamBg:      "rgba(58,42,28,0.5)",
        placeholderBg:"rgba(58,42,28,0.4)",
      };

      const [ready,    setReady]    = React.useState(false);
      const [areaId,   setAreaId]   = React.useState(null);
      const [version,  setVersion]  = React.useState("fr");
      const [caught,   setCaught]   = React.useState({});
      const [items,    setItems]    = React.useState({});
      const [trainers, setTrainers] = React.useState({});

      // Poll localStorage for live state
      React.useEffect(() => {
        function poll() {
          try {
            const aid = localStorage.getItem("frlg-active-area");
            const ver = localStorage.getItem("frlg-version");
            const c   = localStorage.getItem("fr-caught5");
            const it  = localStorage.getItem("fr-items5");
            const tr  = localStorage.getItem("fr-trainers1");
            if (aid) setAreaId(aid);
            if (ver) setVersion(ver);
            if (c)   setCaught(JSON.parse(c));
            if (it)  setItems(JSON.parse(it));
            if (tr)  setTrainers(JSON.parse(tr));
          } catch {}
        }
        poll();
        const id = setInterval(poll, 1500);
        return () => clearInterval(id);
      }, []);

      // Wait for window.__FRLG_AREAS to be populated by the eval'd JSX
      React.useEffect(() => {
        function check() {
          if (window.__FRLG_AREAS) { setReady(true); }
        }
        check();
        const id = setInterval(check, 200);
        return () => clearInterval(id);
      }, []);

      // ── Base panel style ───────────────────────────────────────────────────────
      const panel = {
        width: panelWidth,
        background: T.bg,
        border: `1px solid ${T.border}`,
        borderRadius: 10,
        padding: "10px 14px",
        fontFamily: "'DM Sans', sans-serif",
        color: T.textPrimary,
      };

      const sectionHeader = (accent) => ({
        fontSize: 9, fontWeight: 700, letterSpacing: 2, color: accent,
        borderLeft: `3px solid ${accent}`, paddingLeft: 7, marginBottom: 8,
      });
      const areaLabel = { fontSize: 9, color: T.textMuted, marginBottom: 6 };
      const rowDivider = (i, total) => i < total - 1 ? `1px solid ${T.divider}` : "none";

      // ── Loading / placeholder states ───────────────────────────────────────────
      if (!ready) {
        return <div style={{ ...panel, color: T.textMuted, fontSize: 11 }}>Loading…</div>;
      }
      if (!areaId) {
        return (
          <div style={{ ...panel, color: T.textMuted, fontSize: 11 }}>
            Select an area in the tracker
          </div>
        );
      }

      const area = (window.__FRLG_AREAS || []).find(a => a.id === areaId);
      if (!area) return null;

      // ── Wild Pokémon ───────────────────────────────────────────────────────────
      if (section === "wild") {
        const getSection = m =>
          m === "Surf" ? "surf" :
          (m === "Old Rod" || m === "Good Rod" || m === "Super Rod") ? "fishing" : "land";

        // Build flat row list: { type:"floor", label } | { type:"pokemon", p, fi }
        const floors = area.floors
          ? area.floors.map(f => ({ label: f.label, pokemon: f.pokemon || [] }))
          : [{ label: null, pokemon: area.pokemon || [] }];

        const rows = [];
        floors.forEach(({ label, pokemon }, fi) => {
          const visible = sortByRate(
            pokemon.filter(p => !((p.frOnly && version === "lg") || (p.lgOnly && version === "fr"))),
            version
          );
          if (!visible.length) return;
          if (label) rows.push({ type:"floor", label });
          visible.forEach(p => rows.push({ type:"pokemon", p, fi }));
        });

        if (!rows.length) return null;

        // Per-floor section-done stats for dimming
        const floorSecStats = {};
        rows.forEach(r => {
          if (r.type !== "pokemon") return;
          const key = `${r.fi}:${getSection(r.p.method)}`;
          if (!floorSecStats[key]) floorSecStats[key] = { total:0, done:0 };
          floorSecStats[key].total++;
          if (caught[r.p.name]) floorSecStats[key].done++;
        });
        const secDone = (fi, m) => {
          const key = `${fi}:${getSection(m)}`;
          return floorSecStats[key] && floorSecStats[key].done === floorSecStats[key].total;
        };

        const floorLabelStyle = (isFirst) => ({
          fontSize:9, fontWeight:700, letterSpacing:1,
          color: T.textMuted,
          borderLeft: `2px solid ${T.border}`,
          paddingLeft: 5,
          marginTop: isFirst ? 2 : 8,
          marginBottom: 3,
        });

        return (
          <div style={panel}>
            <div style={sectionHeader(meta.accent)}>{meta.label}</div>
            <div style={areaLabel}>{area.name}</div>
            {rows.map((row, i) => {
              if (row.type === "floor") {
                return <div key={i} style={floorLabelStyle(i === 0)}>{row.label}</div>;
              }
              const p = row.p;
              const isCaught  = caught[p.name];
              const mc        = METHOD_COLOR[p.method] || { bg:"rgba(120,100,80,0.15)", color: T.textMuted };
              const spriteUrl = pokeSprite(p.name);
              const vTag      = p.frOnly ? "FR" : p.lgOnly ? "LG" : null;
              const dimmed    = secDone(row.fi, p.method);
              const nextRow   = rows[i + 1];
              const border    = (!nextRow || nextRow.type === "floor") ? "none" : `1px solid ${T.divider}`;

              return (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:6, padding:"3px 0",
                                      opacity: dimmed ? 0.35 : 1,
                                      borderBottom: border }}>
                  {spriteUrl
                    ? <img src={spriteUrl} alt={p.name} width={24} height={24}
                           style={{ imageRendering:"pixelated", flexShrink:0,
                                    opacity: isCaught ? 1 : 0.65,
                                    filter:  isCaught ? "none" : "brightness(0)" }} />
                    : <div style={{ width:24, height:24, flexShrink:0 }} />
                  }
                  <span style={{ fontSize:11, flex:1, minWidth:0,
                                 color: isCaught ? "#4aaf74" : T.textPrimary,
                                 whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                    {p.name}
                  </span>
                  {vTag && (
                    <span style={{ fontSize:9, fontWeight:700,
                                   color: vTag === "FR" ? "#d4621a" : "#3fa84a",
                                   background: vTag === "FR" ? "rgba(212,98,26,0.15)" : "rgba(63,168,74,0.15)",
                                   borderRadius:4, padding:"1px 5px", flexShrink:0 }}>
                      {vTag}
                    </span>
                  )}
                  <span style={{ fontSize:9, background:mc.bg, color:mc.color,
                                 borderRadius:4, padding:"1px 5px", flexShrink:0 }}>
                    {{"Old Rod":"Old","Good Rod":"Good","Super Rod":"Super"}[p.method] ?? p.method}
                  </span>
                  <span style={{ fontSize:9, color: T.textMuted, flexShrink:0, whiteSpace:"nowrap" }}>
                    {versionRate(p, version)}
                  </span>
                </div>
              );
            })}
          </div>
        );
      }

      // ── Items ──────────────────────────────────────────────────────────────────
      if (section === "items") {
        const entries = flattenItems(area);
        if (!entries.length) return null;

        const floorLabelStyle = (isFirst) => ({
          fontSize:9, fontWeight:700, letterSpacing:1,
          color: T.textMuted,
          borderLeft: `2px solid ${T.border}`,
          paddingLeft: 5,
          marginTop: isFirst ? 2 : 8,
          marginBottom: 3,
        });

        const rows = [];
        let lastFloor = undefined;
        entries.forEach(({ entry, floorLabel, idx }, i) => {
          if (floorLabel !== lastFloor) {
            if (floorLabel) rows.push({ type:"floor", label:floorLabel, isFirst: rows.length === 0 });
            lastFloor = floorLabel;
          }
          rows.push({ type:"item", entry, floorLabel, idx, entryIdx: i });
        });

        return (
          <div style={panel}>
            <div style={sectionHeader(meta.accent)}>{meta.label}</div>
            <div style={areaLabel}>{area.name}</div>
            {rows.map((row, i) => {
              if (row.type === "floor") {
                return <div key={i} style={floorLabelStyle(row.isFirst)}>{row.label}</div>;
              }
              const { entry: it, floorLabel, idx } = row;
              const key       = itemKey(areaId, floorLabel, idx);
              const collected = items[key];
              const spriteUrl = itemSprite(it.name);
              const nextRow   = rows[i + 1];
              const border    = (!nextRow || nextRow.type === "floor") ? "none" : `1px solid ${T.divider}`;

              return (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:6, padding:"3px 0",
                                      opacity: collected ? 0.45 : 1,
                                      borderBottom: border }}>
                  {spriteUrl
                    ? <img src={spriteUrl} alt={it.name} width={24} height={24}
                           style={{ imageRendering:"pixelated", flexShrink:0 }} />
                    : <div style={{ width:24, height:24, background: T.placeholderBg,
                                    borderRadius:4, flexShrink:0 }} />
                  }
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:11, color: collected ? T.textMuted : T.textPrimary,
                                  textDecoration: collected ? "line-through" : "none",
                                  whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                      {it.hidden && <span style={{ color:"#c8960a", marginRight:3 }}>★</span>}
                      {it.name}
                    </div>
                    {it.note && (
                      <div style={{ fontSize:9, color: T.textMuted, marginTop:1,
                                    whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                        {it.note}
                      </div>
                    )}
                  </div>
                  {collected && (
                    <span style={{ fontSize:13, color:"#4aaf74", flexShrink:0 }}>✓</span>
                  )}
                </div>
              );
            })}
          </div>
        );
      }

      // ── Trainers ───────────────────────────────────────────────────────────────
      if (section === "trainers") {
        const entries = flattenTrainers(area);
        if (!entries.length) return null;

        const floorLabelStyle = (isFirst) => ({
          fontSize:9, fontWeight:700, letterSpacing:1,
          color: T.textMuted,
          borderLeft: `2px solid ${T.border}`,
          paddingLeft: 5,
          marginTop: isFirst ? 2 : 8,
          marginBottom: 3,
        });

        const rows = [];
        let lastFloor = undefined;
        entries.forEach(({ trainer, floorLabel }, i) => {
          if (floorLabel !== lastFloor) {
            if (floorLabel) rows.push({ type:"floor", label:floorLabel, isFirst: rows.length === 0 });
            lastFloor = floorLabel;
          }
          rows.push({ type:"trainer", trainer });
        });

        return (
          <div style={panel}>
            <div style={sectionHeader(meta.accent)}>{meta.label}</div>
            <div style={areaLabel}>{area.name}</div>
            {rows.map((row, i) => {
              if (row.type === "floor") {
                return <div key={i} style={floorLabelStyle(row.isFirst)}>{row.label}</div>;
              }
              const tr       = row.trainer;
              const key      = `${areaId}|${tr.class}|${tr.name}`;
              const defeated = trainers[key];
              const nextRow  = rows[i + 1];
              const border   = (!nextRow || nextRow.type === "floor") ? "none" : `1px solid ${T.divider}`;

              return (
                <div key={i} style={{ padding:"4px 0", opacity: defeated ? 0.45 : 1,
                                      borderBottom: border }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <span style={{ fontSize:11, color:"#a87acc", marginRight:4 }}>{tr.class}</span>
                      <span style={{ fontSize:11,
                                     color: defeated ? T.textMuted : T.textPrimary,
                                     textDecoration: defeated ? "line-through" : "none" }}>
                        {tr.name}
                      </span>
                    </div>
                    {defeated && (
                      <span style={{ fontSize:13, color:"#4aaf74", flexShrink:0 }}>✓</span>
                    )}
                  </div>
                  {tr.team && tr.team.length > 0 && (
                    <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:3 }}>
                      {tr.team.map((mon, j) => {
                        const url = pokeSprite(mon.name);
                        return (
                          <div key={j} style={{ display:"flex", alignItems:"center", gap:2,
                                                background: T.teamBg,
                                                borderRadius:5, padding:"1px 5px 1px 2px" }}>
                            {url && (
                              <img src={url} alt={mon.name} width={20} height={20}
                                   style={{ imageRendering:"pixelated" }} />
                            )}
                            <span style={{ fontSize:9, color: T.textMuted }}>
                              {mon.name} <span style={{ color:"#c8960a" }}>{mon.level}</span>
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      }

      return null;
    }

    // ─── Bootstrap ────────────────────────────────────────────────────────────────
    // Fetch and eval the main JSX to populate window.__FRLG_AREAS etc., then mount.
    fetch('firered-area-tracker-v3.jsx?t=' + Date.now())
      .then(r => r.text())
      .then(jsx => {
        const code = Babel.transform(jsx, { presets: ['react'] }).code;
        (0, eval)(code);
      })
      .catch(e => console.error('overlay: failed to load tracker data:', e));

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(OverlayApp));
  </script>
</body>
</html>
